name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────
  # Job 1: Lint com flake8
  # ──────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar flake8
        run: pip install flake8

      - name: Rodar flake8
        run: flake8 tudodemassas/

  # ──────────────────────────────────────────
  # Job 2: Testes Django com PostgreSQL real
  # ──────────────────────────────────────────
  test:
    name: Testes Django
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: tudodemassas_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      SECRET_KEY: ci-secret-key-nao-use-em-producao
      DEBUG: 'True'
      ALLOWED_HOSTS: localhost,127.0.0.1
      POSTGRES_DB: tudodemassas_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: '5432'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar migrations
        working-directory: tudodemassas
        run: python manage.py migrate --noinput

      - name: Rodar testes
        working-directory: tudodemassas
        run: python manage.py test --verbosity=2

  # ──────────────────────────────────────────
  # Job 3: Verificar que o build Docker passa
  # ──────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: tudodemassas:ci
