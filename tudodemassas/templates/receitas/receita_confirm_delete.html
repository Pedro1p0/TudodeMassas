{% extends "base.html" %}

{% block content %}

<div class="max-w-lg mx-auto">
    <div class="bg-white rounded-2xl shadow-sm border border-red-100 p-8 text-center">

        <div class="w-14 h-14 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-7 h-7 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        </div>

        <h1 class="text-xl font-bold text-stone-800 mb-2">Excluir Receita</h1>
        <p class="text-stone-500 mb-1">Você tem certeza que deseja excluir</p>
        <p class="text-lg font-semibold text-stone-800 mb-6">"{{ object.name }}"?</p>
        <p class="text-sm text-red-500 mb-6">Essa ação não pode ser desfeita.</p>

        <form method="POST" class="flex gap-3 justify-center">
            {% csrf_token %}
            <button type="submit"
                class="bg-red-500 hover:bg-red-600 text-white font-semibold px-6 py-2 rounded-lg transition-colors">
                Sim, excluir
            </button>
            <a href="{% url 'perfil' %}"
                class="border border-stone-300 hover:bg-stone-100 text-stone-700 font-semibold px-6 py-2 rounded-lg transition-colors">
                Cancelar
            </a>
        </form>

    </div>
</div>

{% endblock content %}
